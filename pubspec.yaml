name: reeder
description: A minimalist RSS reader app inspired by Reeder.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3

  # Routing
  go_router: ^14.0.0

  # Database
  drift: ^2.22.0
  sqlite3_flutter_libs: ^0.5.0
  path_provider: ^2.1.2
  path: ^1.9.0

  # Network
  dio: ^5.4.0

  # RSS Parsing
  webfeed_plus: ^1.0.0

  # HTML Rendering
  flutter_widget_from_html: ^0.15.0

  # WebView
  flutter_inappwebview: ^6.0.0

  # Audio
  just_audio: ^0.9.36

  # Video
  video_player: ^2.8.2
  chewie: ^1.7.4

  # Image
  cached_network_image: ^3.3.1

  # Notifications
  flutter_local_notifications: ^17.0.0

  # Sharing
  share_plus: ^7.2.1
  url_launcher: ^6.2.4

  # Internationalization
  intl: ^0.19.0

  # Secure Storage
  flutter_secure_storage: ^9.0.0

  # Connectivity
  connectivity_plus: ^6.0.0

  # HTML parsing
  html: ^0.15.4

  # File picker (for OPML import)
  file_picker: ^8.0.0

dependency_overrides:
  package_info_plus: ^8.1.3
  wakelock_plus: '>=1.2.0 <1.3.0'

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  mockito: ^5.4.4
  build_runner: ^2.4.8
  riverpod_generator: ^2.3.9
  drift_dev: ^2.22.0

flutter:
  generate: true
  uses-material-design: true
